    <script>
    (function() {
        const readmeRaw = "# Klettergebietstour Deluxe\n\n## Das Projekt\nWir sind Peter uns Jens, zwei begeisterte Outdoor-Sportler die die Sächsische Schweiz und ihre Klettergebiete lieben.\nUnser Ziel bei der Klettergebietstour Deluxe ist es, alle Klettergebiete der Sächsischen Schweiz zu besuchen um dort in jedem Gebiet jeweils eine ikonische Route zu klettern.\nEinzige Einschränkung: das ganze muss innerhalb von 24 Stunden passieren und wir müssen dabei von einem Gebiet zum nächsten laufen, also ohne Auto, Fahrrad oder andere Fortbewegungsmittel. Und alles was wir über die Tour brauchen, müssen wir aus eigener Kraft mit uns nehmen.\n\nInsgesamt stehen also 13 Klettergebiete und damit 13 Gipfel auf dem Plan. Die Route ist insgesamt ca. 80km lang und es müssen ca. 2200 Höhenmeter überwunden werden. Die Tour soll im Sommer 2027 in der Woche der Sommersonnenwende stattfinden, wenn die Bedingungen am besten sind.\n\nDas ganze soll natürlich nicht nur ein tolles Erlebnis für uns werden, sondern auch eine tolle Dokumentation, die wir mit euch teilen können. \n\n---\n\n## Wer sind wir\nPeter Bessler ist Industriekletterer und Unternehmer und hat als gebürtiger Leipziger das Klettern in der Sächsischen Schweiz vor über 20 Jahren für sich entdeckt und ist seitdem regelmäßig in den Gebieten unterwegs.\n\nJens Decke ist Ingenieur und Guinness Weltrekordhalter aus Eschwege. \n![Peter + Jens](Muesli.JPG)\n\nWir sind seit vielen Jahren über den Bergsport insbesondere dem Highlining eng verbunden und haben schon einige Ideen gemeinsam umgesetzt. Unsere Leidenschaft ist es sportarten miteinander zu verbinden und so neue Erlebnisse zu schaffen.\n\nZum einen begeistern uns Ausdauersportarten wie Trailrunning, Bergwandern, Klettern, Slacklinen\n\n![Chamnonix Marathon](ChamonixMarathon.jpeg)\n\nUnser bisher größtes gemeinsames Projekt war eine besteigung des Matterhorns (4478m ü. M.) von Cervina aus. Das ganze haben wir auch innerhalb eines Tages gemacht und das ganze mit einer Highline begehung am Italienischen Gipfel verbunden.\n![Matterhorn Gipfel Highline](Matterhorn.jpeg)\n\n\n---\n\n## Was brauchen wir\n- Unterstützung von Sponsoren zum einen bei der Tour selbst aber insbesondere auch in der Vorbereitung\n- Monetär\n- Ausrüstung\n- Verpflegung\n\n- Dokumentationsteam, um das Projekt in Form eines Projektfilms festzuhalten und zum anderen Werbe/Promomaterial für Sponsoren zu erstellen.";
        const contentEl = document.getElementById('projekt-content');
        if (readmeRaw && readmeRaw.trim()) {
            contentEl.innerHTML = marked.parse(readmeRaw);
        } else {
            contentEl.innerHTML = '<p style="color:#999;font-style:italic;">Noch keine Projektbeschreibung. Bearbeite README.md und generiere die Karte neu.</p>';
        }
    })();

        icon.textContent = projektVisible ? '▼' : '▶';

    </script>

chteste ist Westkamin (II). Der AW war in der Teufelsturm-Liste unter den ersten 50 Routen nicht explizit mit dem Namen 'AW' sichtbar. Der Große Lorenzstein hat den bekannten AW durch ein Kaminsystem (Schwierigkeit II). Höhe laut hikr.org: 330 m."}, {"nr": 5, "gipfel": "Bloßstock", "route": "Alter Nordweg (V) / Domerker - Alter Weg (III, 33m)", "schwierigkeit": "Bloßstock AW (Alter Nordweg): V, Domerker AW: III", "hoehe_m": 352, "seillaengen": "1-2", "link_blossstock": "https://www.teufelsturm.de/wege/suche.php?gipfelnr=873", "link_domerker": "https://www.thecrag.com/de/klettern/germany/sachsische-schweiz/affensteine/route/218524455", "link": "https://www.teufelsturm.de/wege/suche.php?gipfelnr=873", "gebiet": "Affensteine", "anmerkungen": "Bloßstock: 351,6 m ü. NN, Nordwand 79,5 m hoch, ca. 26 Routen. Leichtester Weg ist Alter Nordweg (V) und Wenzelweg (V). Der Domerker (Domwächter) nebenan hat einen AW mit Grad III, 33 m Länge. Übertritt vom Domerker zum Bloßstock ist eine Option."}, {"nr": 6, "gipfel": "Rauschenstein", "route": "Alter Weg / Alter Südweg", "schwierigkeit": "II", "hoehe_m": 406, "seillaengen": 1, "link": "https://www.teufelsturm.de/wege/suche.php?gipfelnr=693", "gebiet": "Schmilkaer Gebiet", "anmerkungen": "Rauschenstein ist ca. 40 m hoher Sandsteinfels über Schmilka, Gipfelplateau auf 406 m ü. NN. Der AW und der Alter Südweg sind beide Grad II. Erstbesteigung 1893 durch Böhme, Meurer, Schuster. 51 Routen insgesamt."}, {"nr": 7, "gipfel": "Falkenstein", "route": "Schusterweg", "schwierigkeit": "III (Stellen bis IV)", "hoehe_m": 381, "seillaengen": 6, "link": "https://www.thecrag.com/en/climbing/germany/sachsische-schweiz/falkenstein/route/224017110", "gebiet": "Schrammsteingebiet", "anmerkungen": "Absoluter Klassiker! 125 m Kletterstrecke in 6 Seillängen. Falkenstein 381 m ü. NN, massivster freistehender Fels der Sächsischen Schweiz. Erstbegehung 1892 durch Oscar Schuster und Martin Klimmer. Mit berühmter Porzellankante und Schusterplakette (Nase reiben bringt Glück). Ca. 3,5 Stunden Kletterzeit."}, {"nr": 8, "gipfel": "Großer Halben", "route": "Alter Weg (AW)", "schwierigkeit": "unsicher, vermutlich III-IV", "hoehe_m": "unsicher, ca. 350", "seillaengen": "1-2 (unsicher)", "link": "https://www.thecrag.com/en/climbing/germany/sachsische-schweiz/brand/area/230528190", "gebiet": "Brandgebiet", "anmerkungen": "Großer Halben liegt im Brandgebiet (Halbenweg). 89 Routen, darunter extreme Routen bis XIb. Die genaue Schwierigkeit des AW konnte nicht eindeutig ermittelt werden. Bekannte Routen am Großen Halben sind v.a. schwere Wandklettereien."}, {"nr": 9, "gipfel": "Lokomotive (Lok)", "route": "Überfall", "schwierigkeit": "V", "hoehe_m": "unsicher, ca. 50-60 (Felsformation), 25 m Routenlänge", "seillaengen": 1, "link": "https://www.thecrag.com/en/climbing/germany/sachsische-schweiz/rathen/route/229077450", "gebiet": "Rathener Gebiet", "anmerkungen": "Der berühmteste Überfall der Sächsischen Schweiz! Erstbegehung 1903 durch Albert Kunze und Oliver Perry-Smith. Route: Vom Dom über Kesselgrat zur Pfeife, dann Überfall zur Esse (Sprung über ca. 1,72 m breite Scharte), dann Quergang rechts und Riss. 25 m Routenlänge, Grad V mit ausreichender Sicherung."}, {"nr": 10, "gipfel": "Wetterwarte", "route": "Alter Weg (AW)", "schwierigkeit": "I", "hoehe_m": "unsicher, ca. 250-300", "seillaengen": 1, "link": "https://www.thecrag.com/de/klettern/germany/sachsische-schweiz/wehlen", "gebiet": "Wehlener Gebiet", "anmerkungen": "Wetterwarte ist ein kleiner Klettergipfel im Wehlener Gebiet. Der AW ist Grad I (aus der Klettergebietstour-Beschreibung bestätigt). Genaue Höhe nicht ermittelt. Es gibt eine 'Variante zum Alten Weg' als weitere Route."}, {"nr": 11, "gipfel": "Lilienstein-Westecke", "route": "Westkante (VIIb) / Kneifervariante (VIIa)", "schwierigkeit": "Westkante: VIIb, Kneifervariante: VIIa", "hoehe_m": 342, "seillaengen": "3-4", "link": "https://www.teufelsturm.de/wege/suche.php?gipfelnr=97", "gebiet": "Gebiet der Steine", "anmerkungen": "Lilienstein-Westecke ist ein eigenständiger Klettergipfel am Lilienstein (415 m ü. NN). Die Westecke selbst auf 342 m. Westkante-Erstbegehung 1960 durch Dieter Rauchmaul (VIIb). Kneifervariante (VIIa) weicht nach rechts aus. Ca. 40 Routen bis Grad X. Abseilstrecken: 20+7+23 m. ACHTUNG: Seillänge beim Abseilen prüfen!"}, {"nr": 12, "gipfel": "Kuckuckstein", "route": "Alter Weg (AW)", "schwierigkeit": "I", "hoehe_m": "ca. 340", "seillaengen": 1, "link": "https://www.teufelsturm.de/wege/suche.php?gipfelnr=348", "gebiet": "Erzgebirgsgrenzgebiet", "anmerkungen": "Kleiner Fels direkt neben Wohngebiet. AW ist Grad I (manche Kletterer meinen eher II wegen Zug auf Absatz). 9 Routen insgesamt (I bis VIIc). Kein Chalk erlaubt! Höhe ca. 340 m ü. NN. Form erinnert an einen Vogelkopf mit künstlichem Sichtloch als Auge."}, {"nr": 13, "gipfel": "Kleine Herkulessäule / Daxenstein", "route": "Kleine Herkulessäule AW (IV) / Daxenstein AW (I)", "schwierigkeit": "Kleine Herkulessäule AW: IV, Daxenstein AW: I", "hoehe_m": "Kleine Herkulessäule: ca. 20 m Turmhöhe (auf ~290 m ü. NN), Daxenstein: unsicher", "seillaengen": 1, "link_herkulessaeule": "https://www.teufelsturm.de/wege/suche.php?gipfelnr=115", "link_daxenstein": "https://www.teufelsturm.de/wege/suche.php?gipfelnr=143", "link": "https://www.teufelsturm.de/wege/suche.php?gipfelnr=115", "gebiet": "Bielatal", "anmerkungen": "Kleine Herkulessäule: ca. 20 m hoher schlanker Turm im Bielatal, Erstbegehung 1905 durch Schueller und Perry-Smith. AW Grad IV, 17 Routen (IV bis VIIIc). Daxenstein: 35 Routen, AW Grad I. Das Bielatal hat die höchste Gipfeldichte der Sächsischen Schweiz und ist ideal für Einsteiger."}];
        const tbody = document.getElementById('etappen-tbody');

            tr.addEventListener('click', () => showRouteInfo(et.gipfel_nr, color));

        // Summenzeile
        const totalDist = etappen.reduce((s, e) => s + e.dist_km, 0);
        const totalAsc = etappen.reduce((s, e) => s + e.ascent_m, 0);
        const trTotal = document.createElement('tr');
        trTotal.style.borderTop = '2px solid #333';
        trTotal.style.fontWeight = 'bold';
        trTotal.innerHTML =
            '<td style="padding:4px 8px;" colspan="3">Gesamt</td>' +

        tbody.appendChild(trTotal);

        // Polyline-Elemente: Event-Listener
        setTimeout(() => {
            document.querySelectorAll('.etappe-line').forEach(el => {
                const match = el.className.baseVal.match(/etappe-(\d+)/);
                if (match) {
                    const nr = parseInt(match[1]);
                    el.addEventListener('mouseenter', () => {

        window.showRouteInfo = function(gipfelNr, color) {
            const info = routenByNr[gipfelNr];
            if (!info) return;

            const panel = document.getElementById('route-info-panel');
            const header = document.getElementById('route-info-header');
            const title = document.getElementById('route-info-title');
            const body = document.getElementById('route-info-body');

            header.style.background = color || '#333';
            title.textContent = info.gipfel;

            let html = '';
            html += '<div class="info-row"><span class="info-label">Route</span><span class="info-value">' + info.route + '</span></div>';
            html += '<div class="info-row"><span class="info-label">Schwierigkeit (sächs.)</span><span class="info-value">' + info.schwierigkeit + '</span></div>';
            html += '<div class="info-row"><span class="info-label">Höhe</span><span class="info-value">' + info.hoehe_m + ' m</span></div>';
            html += '<div class="info-row"><span class="info-label">Seillängen</span><span class="info-value">' + info.seillaengen + '</span></div>';
            html += '<div class="info-row"><span class="info-label">Gebiet</span><span class="info-value">' + info.gebiet + '</span></div>';

            if (info.anmerkungen) {
                html += '<div class="info-note">' + info.anmerkungen + '</div>';
            }

            html += '<a class="info-link" href="' + info.link + '" target="_blank" rel="noopener">Mehr Infos &rarr;</a>';

            body.innerHTML = html;
            panel.style.display = 'block';
        };

        window.closeRouteInfo = function() {
            document.getElementById('route-info-panel').style.display = 'none';
        };

        function highlightEtappe(nr) {
            highlightRow(nr);
            const line = document.querySelector('.etappe-' + nr);
            if (line) line.classList.add('etappe-highlight');
        }

        function unhighlightEtappe(nr) {
            unhighlightRow(nr);
            const line = document.querySelector('.etappe-' + nr);
            if (line) line.classList.remove('etappe-highlight');
        }

        function highlightRow(nr) {
            const row = document.getElementById('etappe-row-' + nr);
            if (row) {
                row.classList.add('highlight');
                row.scrollIntoView({ block: 'nearest' });
            }
        }

        function unhighlightRow(nr) {
            const row = document.getElementById('etappe-row-' + nr);
            if (row) row.classList.remove('highlight');
        }
    })();

    let tableVisible = true;
    function toggleTable() {
        const wrap = document.getElementById('etappen-tbody-wrap');
        const icon = document.getElementById('toggle-icon');
        tableVisible = !tableVisible;
        wrap.style.display = tableVisible ? '' : 'none';
        icon.textContent = tableVisible ? '▼' : '▶';
    }
    </script>
