merkungen": "Lilienstein-Westecke ist ein eigenständiger Klettergipfel am Lilienstein (415 m ü. NN). Die Westecke selbst auf 342 m. Westkante-Erstbegehung 1960 durch Dieter Rauchmaul (VIIb). Kneifervariante (VIIa) weicht nach rechts aus. Ca. 40 Routen bis Grad X. Abseilstrecken: 20+7+23 m. ACHTUNG: Seillänge beim Abseilen prüfen!"}, {"nr": 12, "gipfel": "Kuckuckstein", "route": "Alter Weg (AW)", "schwierigkeit": "I", "hoehe_m": "ca. 340", "seillaengen": 1, "link": "https://www.teufelsturm.de/wege/suche.php?gipfelnr=348", "gebiet": "Erzgebirgsgrenzgebiet", "anmerkungen": "Kleiner Fels direkt neben Wohngebiet. AW ist Grad I (manche Kletterer meinen eher II wegen Zug auf Absatz). 9 Routen insgesamt (I bis VIIc). Kein Chalk erlaubt! Höhe ca. 340 m ü. NN. Form erinnert an einen Vogelkopf mit künstlichem Sichtloch als Auge."}, {"nr": 13, "gipfel": "Kleine Herkulessäule / Daxenstein", "route": "Kleine Herkulessäule AW (IV) / Daxenstein AW (I)", "schwierigkeit": "Kleine Herkulessäule AW: IV, Daxenstein AW: I", "hoehe_m": "Kleine Herkulessäule: ca. 20 m Turmhöhe (auf ~290 m ü. NN), Daxenstein: unsicher", "seillaengen": 1, "link_herkulessaeule": "https://www.teufelsturm.de/wege/suche.php?gipfelnr=115", "link_daxenstein": "https://www.teufelsturm.de/wege/suche.php?gipfelnr=143", "link": "https://www.teufelsturm.de/wege/suche.php?gipfelnr=115", "gebiet": "Bielatal", "anmerkungen": "Kleine Herkulessäule: ca. 20 m hoher schlanker Turm im Bielatal, Erstbegehung 1905 durch Schueller und Perry-Smith. AW Grad IV, 17 Routen (IV bis VIIIc). Daxenstein: 35 Routen, AW Grad I. Das Bielatal hat die höchste Gipfeldichte der Sächsischen Schweiz und ist ideal für Einsteiger."}];
        const tbody = document.getElementById('etappen-tbody');

        // Routeninfos nach gipfel_nr indizieren
        const routenByNr = {};

        const trStart = document.createElement('tr');

        trStart.innerHTML =

            'Start</td>' +
            '<td style="padding:3px 8px;">' + startInfo.gebiet + '</td>' +
            '<td style="padding:3px 8px;">' + startInfo.gipfel + '</td>' +
            '<td style="padding:3px 8px;text-align:right;">–</td>' +
            '<td style="padding:3px 8px;text-align:right;">–</td>' +
            '<td style="padding:3px 8px;text-align:right;color:#666;">0.0</td>' +
            '<td style="padding:3px 8px;text-align:right;color:#666;">0</td>';
        tbody.appendChild(trStart);

        // Etappen aufbauen
        etappen.forEach((et, i) => {
            const color = farben[i % farben.length];
            const tr = document.createElement('tr');
            tr.id = 'etappe-row-' + et.nr;
            tr.innerHTML =
                '<td style="padding:3px 8px;"><span style="display:inline-block;width:12px;height:12px;' +
                'border-radius:50%;background:' + color + ';margin-right:4px;vertical-align:middle;"></span>' +
                et.nr + '</td>' +
                '<td style="padding:3px 8px;">' + et.gebiet + '</td>' +
                '<td style="padding:3px 8px;">' + et.gipfel + '</td>' +
                '<td style="padding:3px 8px;text-align:right;">' + et.dist_km.toFixed(1) + '</td>' +
                '<td style="padding:3px 8px;text-align:right;">' + et.ascent_m + '</td>' +
                '<td style="padding:3px 8px;text-align:right;color:#666;">' + et.cum_dist_km.toFixed(1) + '</td>' +
                '<td style="padding:3px 8px;text-align:right;color:#666;">' + et.cum_ascent_m + '</td>';

            // Hover -> Etappenlinie highlighten
            tr.addEventListener('mouseenter', () => highlightEtappe(et.nr));
            tr.addEventListener('mouseleave', () => unhighlightEtappe(et.nr));
            // Klick -> Routeninfo anzeigen
            tr.addEventListener('click', () => showRouteInfo(et.gipfel_nr, color));
            tbody.appendChild(tr);
        });

        // Summenzeile
        const totalDist = etappen.reduce((s, e) => s + e.dist_km, 0);
        const totalAsc = etappen.reduce((s, e) => s + e.ascent_m, 0);
        const trTotal = document.createElement('tr');
        trTotal.style.borderTop = '2px solid #333';
        trTotal.style.fontWeight = 'bold';
        trTotal.innerHTML =
            '<td style="padding:4px 8px;" colspan="3">Gesamt</td>' +
            '<td style="padding:4px 8px;text-align:right;">' + totalDist.toFixed(1) + '</td>' +
            '<td style="padding:4px 8px;text-align:right;">' + totalAsc + '</td>' +
            '<td colspan="2"></td>';
        tbody.appendChild(trTotal);

        setTimeout(() => {
            document.querySelectorAll('.etappe-line').forEach(el => {
                const match = el.className.baseVal.match(/etappe-(\d+)/);
                if (match) {
                    const nr = parseInt(match[1]);
                    el.addEventListener('mouseenter', () => {
                        highlightRow(nr);
                        el.classList.add('etappe-highlight');
                    });
                    el.addEventListener('mouseleave', () => {
                        unhighlightRow(nr);
                        el.classList.remove('etappe-highlight');
                    });
                }
            });
        }, 1000);

        window.showRouteInfo = function(gipfelNr, color) {
            const info = routenByNr[gipfelNr];
            if (!info) return;

            const panel = document.getElementById('route-info-panel');
            const header = document.getElementById('route-info-header');
            const title = document.getElementById('route-info-title');
            const body = document.getElementById('route-info-body');

            header.style.background = color || '#333';
            title.textContent = info.gipfel;

            let html = '';
            html += '<div class="info-row"><span class="info-label">Route</span><span class="info-value">' + info.route + '</span></div>';
            html += '<div class="info-row"><span class="info-label">Schwierigkeit (sächs.)</span><span class="info-value">' + info.schwierigkeit + '</span></div>';
            html += '<div class="info-row"><span class="info-label">Höhe</span><span class="info-value">' + info.hoehe_m + ' m</span></div>';
            html += '<div class="info-row"><span class="info-label">Seillängen</span><span class="info-value">' + info.seillaengen + '</span></div>';
            html += '<div class="info-row"><span class="info-label">Gebiet</span><span class="info-value">' + info.gebiet + '</span></div>';

            if (info.anmerkungen) {
                html += '<div class="info-note">' + info.anmerkungen + '</div>';
            }

            html += '<a class="info-link" href="' + info.link + '" target="_blank" rel="noopener">Mehr Infos &rarr;</a>';

            body.innerHTML = html;
            panel.style.display = 'block';
        };

        window.closeRouteInfo = function() {
            document.getElementById('route-info-panel').style.display = 'none';
        };

        function highlightEtappe(nr) {
            highlightRow(nr);
            const line = document.querySelector('.etappe-' + nr);
            if (line) line.classList.add('etappe-highlight');
        }

        function unhighlightEtappe(nr) {
            unhighlightRow(nr);
            const line = document.querySelector('.etappe-' + nr);
            if (line) line.classList.remove('etappe-highlight');
        }

        function highlightRow(nr) {
            const row = document.getElementById('etappe-row-' + nr);
            if (row) {
                row.classList.add('highlight');
                row.scrollIntoView({ block: 'nearest' });
            }
        }

        function unhighlightRow(nr) {
            const row = document.getElementById('etappe-row-' + nr);
            if (row) row.classList.remove('highlight');
        }
    })();

    let tableVisible = true;
    function toggleTable() {
        const wrap = document.getElementById('etappen-tbody-wrap');
        const icon = document.getElementById('toggle-icon');
        tableVisible = !tableVisible;
        wrap.style.display = tableVisible ? '' : 'none';
        icon.textContent = tableVisible ? '▼' : '▶';
    }
    </script>
